<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mridul Hasan — Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      :root {
        --bg: hsl(0, 0%, 8%);
        --card-bg: hsl(0, 0%, 12%);
        --btn-bg: hsl(0, 0%, 20%);
        --white: hsl(0, 0%, 100%);
        --white-muted: hsla(0, 0%, 100%, 0.75);
        --accent: hsl(75, 94%, 57%);
        --accent-dark: hsl(75, 80%, 30%);
      }

      body {
        background-color: var(--bg);
        font-family: "Syne", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem 1rem;
        color: var(--white);
      }

      .card {
        background-color: var(--card-bg);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2.5rem 2rem;
        max-width: 360px;
        width: 100%;
        gap: 0;
      }

      .card__image {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 1.25rem;
        border: 3px solid var(--btn-bg);
      }

      .card__name {
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        text-align: center;
        margin-bottom: 0.3rem;
      }

      .card__location {
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
        font-family: "Space Mono", monospace;
        text-align: center;
        margin-bottom: 1rem;
        letter-spacing: 0.03em;
      }

      .card__bio {
        color: var(--white-muted);
        font-size: 0.85rem;
        text-align: center;
        margin-bottom: 1.75rem;
        line-height: 1.6;
      }

      .card__buttons {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 0.5rem;
      }

      .card__button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        width: 100%;
        padding: 0.8rem 1rem;
        border-radius: 10px;
        background-color: var(--btn-bg);
        color: var(--white);
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 0.8rem;
        letter-spacing: 0.04em;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.3s ease, color 0.3s ease, transform 0.15s ease;
        border: none;
        text-transform: uppercase;
      }

      .card__button svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
      }

      .card__button:hover {
        background-color: var(--accent);
        color: var(--bg);
        transform: translateY(-1px);
      }

      .card__button:active {
        transform: translateY(0px);
      }

      .card__section-label {
        width: 100%;
        text-align: left;
        font-size: 0.65rem;
        font-family: "Space Mono", monospace;
        color: var(--white-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.6rem 0 0.1rem;
        opacity: 0.5;
      }

      /* subtle grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
      }

      @media (max-width: 400px) {
        .card {
          padding: 2rem 1.25rem;
        }
      }
    </style>
  </head>
